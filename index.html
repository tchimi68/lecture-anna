<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ff8fa3">
<title>Zigo et les Sons Rigolos</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="Sons Rigolos">
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap');

:root{
  --green:#1f9d55;
  --other:var(--green);
  --silent:#b7b2ad;
  --ink:#2b2620;
  --bg1:#fff6e9;
  --bg2:#ffe9d6;
  --card:#ffffff;
  --accent:#ff6b6b;
  --accent2:#3fb6d3;
  --radius:22px;
  --shadow: 0 5px 0 rgba(0,0,0,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Baloo 2', 'Comic Sans MS', system-ui, sans-serif;
  background:
    radial-gradient(circle at 10% 10%, #fff2da 0%, transparent 45%),
    radial-gradient(circle at 90% 20%, #e6f9ff 0%, transparent 40%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  color:var(--ink);
  min-height:100%;
  overflow-x:hidden;
  text-transform:uppercase;
}
#app{max-width:900px;margin:0 auto;padding-bottom:40px;min-height:100vh;position:relative;}
button{font-family:inherit;}
h1,h2,h3{margin:0;}

/* ---------- header ---------- */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;position:sticky;top:0;z-index:20;
  background:rgba(255,246,233,.9);backdrop-filter:blur(6px);
  border-bottom:3px dashed #ffd9a8;
}
.iconbtn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--card);box-shadow:var(--shadow);
  font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.iconbtn:active{transform:translateY(3px);box-shadow:none;}
.topbar h1{font-size:1.15rem;flex:1;text-align:center;color:#a8502f;}
.starcount{
  display:flex;align-items:center;gap:4px;background:#fff3c4;border-radius:20px;
  padding:6px 12px;font-weight:800;box-shadow:var(--shadow);font-size:.95rem;white-space:nowrap;
}

/* ---------- mascot ---------- */
.mascot-row{display:flex;align-items:flex-end;gap:10px;padding:14px 16px 4px;}
.mascot{
  font-size:3rem;flex-shrink:0;
  filter:drop-shadow(0 4px 2px rgba(0,0,0,.15));
  animation:bob 2.6s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.bubble{
  background:var(--card);border-radius:18px;border:3px solid #ffd9a8;
  padding:10px 16px;font-weight:700;font-size:1rem;position:relative;box-shadow:var(--shadow);
  flex:1;
}
.bubble:after{
  content:"";position:absolute;left:-10px;bottom:14px;
  border:8px solid transparent;border-right-color:#ffd9a8;
}

/* ---------- home path ---------- */
.daily{
  margin:6px 16px 10px;padding:14px;border-radius:var(--radius);
  background:linear-gradient(120deg,#ffe1ee,#e1f3ff);
  box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;border:none;width:calc(100% - 32px);text-align:left;
}
.daily .demoji{font-size:2.6rem;}
.daily b{display:block;font-size:1rem;color:#a8502f;}
.daily span{font-size:.85rem;opacity:.75;}

.path{padding:20px 16px 10px;display:flex;flex-direction:column;gap:0;position:relative;}
.path-row{display:flex;align-items:center;gap:14px;position:relative;}
.path-row.rev{flex-direction:row-reverse;}
.connector{
  width:4px;height:34px;background:repeating-linear-gradient(180deg,#e7c9a0 0 8px, transparent 8px 16px);
  margin:0 auto;
}
.node{
  border:none;border-radius:24px;padding:14px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);cursor:pointer;flex:1;text-align:left;position:relative;
  transform:scale(1);transition:transform .12s;
}
.node:active{transform:scale(.96);}
.node .bubble-son{
  width:60px;height:60px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1.4rem;color:var(--green);flex-shrink:0;box-shadow:inset 0 0 0 3px rgba(0,0,0,.06);text-transform:uppercase;
}
.node .meta{flex:1;min-width:0;}
.node .meta b{display:block;font-size:1.1rem;}
.node .stars{font-size:.82rem;opacity:.8;}
.node .demoji{font-size:2.2rem;flex-shrink:0;}
.node.done{outline:3px solid #ffd166;}

/* ---------- generic screen ---------- */
.screen{padding:16px;}
.center{text-align:center;}
.legend{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  background:var(--card);border-radius:16px;padding:10px 14px;box-shadow:var(--shadow);margin:10px 0 18px;
  font-size:.82rem;font-weight:700;
}
.legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.dot-g{background:var(--green);} .dot-b{background:var(--other);} .dot-s{background:var(--silent);} .dot-n{background:var(--ink);}

.sonhead{
  display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px;
}
.sonhead .big{
  font-size:3.6rem;font-weight:800;color:var(--green);background:#fff;border-radius:30px;
  padding:10px 34px;box-shadow:var(--shadow);text-transform:uppercase;
}
.mnemo{font-size:.95rem;text-align:center;max-width:420px;margin:4px auto 0;opacity:.85;font-weight:600;}

.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px;}
@media(min-width:600px){.menu-grid{grid-template-columns:repeat(3,1fr);}}
.gamebtn{
  border:none;border-radius:20px;padding:16px 10px;background:var(--card);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;position:relative;font-weight:700;
}
.gamebtn:active{transform:translateY(3px);box-shadow:none;}
.gamebtn .gi{font-size:2.2rem;}
.gamebtn .check{position:absolute;top:6px;right:10px;font-size:1rem;}

/* word card */
.wordgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
.wordcard{
  background:var(--card);border-radius:20px;padding:18px 10px;text-align:center;box-shadow:var(--shadow);
  cursor:pointer;border:none;
}
.wordcard:active{transform:translateY(3px);box-shadow:none;}
.wordcard .we{font-size:3.8rem;display:block;margin-bottom:8px;}
.seg-t{color:var(--green);}
.seg-b{color:var(--other);}
.seg-s{color:var(--silent);}
.seg-n{color:var(--ink);}
.speaker{font-size:.85rem;opacity:.55;margin-top:6px;}

/* tout mot à lire = capitales + script cursif, empilés */
.word-block{display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.15;}
.word-block .w-upper{font-family:'Baloo 2',sans-serif;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.word-block .w-script{font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;font-weight:700;text-transform:none;}
.wordcard .word-block .w-upper{font-size:1.8rem;}
.wordcard .word-block .w-script{font-size:2.3rem;}

.finishbar{display:flex;justify-content:center;margin-top:20px;}
.btn{
  border:none;border-radius:18px;padding:14px 26px;font-weight:800;font-size:1rem;cursor:pointer;
  background:var(--accent);color:#fff;box-shadow:0 5px 0 #c94b4b;
}
.btn:active{transform:translateY(4px);box-shadow:none;}
.btn.secondary{background:var(--accent2);box-shadow:0 5px 0 #278aa1;}
.btn.ghost{background:#fff;color:var(--ink);box-shadow:var(--shadow);}

/* sentences */
.sentcard{background:var(--card);border-radius:18px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer;}
.sentcard:active{transform:translateY(3px);}
.sent-upper{font-family:'Baloo 2',sans-serif;font-size:1.6rem;font-weight:800;line-height:1.6;letter-spacing:.5px;text-transform:uppercase;}
.sent-script{font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;font-size:2rem;font-weight:700;line-height:1.3;text-transform:none !important;margin-top:8px;padding-top:8px;border-top:2px dashed #e7d3b0;}

/* memory */
.memgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;perspective:600px;}
@media(min-width:520px){.memgrid{grid-template-columns:repeat(4,1fr);}}
.memcard{aspect-ratio:1/1;position:relative;cursor:pointer;}
.memcard .face{
  position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;transition:transform .35s;box-shadow:var(--shadow);font-weight:800;
  text-align:center;padding:4px;overflow:hidden;
}
.memcard .back{background:linear-gradient(135deg,#ffb4a2,#ffd166);font-size:3.2rem;color:#fff;}
.memcard .front{background:#fff;transform:rotateY(180deg);}
.memcard .front.front-emoji{font-size:3.4rem;}
.memcard .front .word-block .w-upper{font-size:.8rem;}
.memcard .front .word-block .w-script{font-size:1.05rem;}
.memcard.flip .back{transform:rotateY(180deg);}
.memcard.flip .front{transform:rotateY(0);}
.memcard.matched .front{background:#e5ffe0;}

/* quiz / intrus */
.qimg{font-size:6.5rem;text-align:center;margin:10px 0 20px;}
.optgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.optbtn{
  border:none;border-radius:18px;padding:20px 10px;background:#fff;box-shadow:var(--shadow);
  font-size:1.5rem;font-weight:800;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;
}
.optbtn .word-block .w-upper{font-size:1.25rem;}
.optbtn .word-block .w-script{font-size:1.6rem;}
.optbtn:active{transform:translateY(3px);box-shadow:none;}
.optbtn.correct{background:#c8f7c5;}
.optbtn.wrong{background:#ffd0d0;}
.shake{animation:shake .4s;}
@keyframes shake{10%,90%{transform:translateX(-4px)}20%,80%{transform:translateX(6px)}30%,50%,70%{transform:translateX(-9px)}40%,60%{transform:translateX(9px)}}

/* trous */
.blankword{text-align:center;margin:18px 0;}
.blankword .word-block .w-upper{font-size:2rem;}
.blankword .word-block .w-script{font-size:2.4rem;}
.blank{display:inline-block;min-width:1.4em;border-bottom:4px dotted var(--accent);color:transparent;}

/* tri */
.pool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
.chip{
  border:none;border-radius:16px;padding:10px 16px;background:#fff;box-shadow:var(--shadow);cursor:pointer;
}
.chip .word-block .w-upper{font-size:1rem;}
.chip .word-block .w-script{font-size:1.3rem;}
.chip.sel{outline:3px solid var(--accent);}
.chip.placed{opacity:.35;pointer-events:none;}
.zones{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
.zone{
  flex:1;min-width:140px;border:3px dashed #cbb994;border-radius:18px;padding:12px;min-height:120px;background:rgba(255,255,255,.5);
}
.zone h4{margin:0 0 8px;text-align:center;font-size:1.05rem;}
.zone .items{display:flex;flex-wrap:wrap;gap:8px;}
.zone .items span{background:#fff;border-radius:10px;padding:6px 10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:4px;}
.zone .items span .word-block .w-upper{font-size:.9rem;}
.zone .items span .word-block .w-script{font-size:1.1rem;}

/* finish */
.finish{text-align:center;padding:30px 16px;}
.finish .fe{font-size:4.5rem;animation:pop .5s;}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.finish h2{font-size:1.6rem;color:#a8502f;margin:10px 0 4px;}
.finish p{opacity:.8;margin:0 0 18px;}
.finish-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
.modal{background:#fff;border-radius:24px;padding:22px;max-width:400px;width:100%;box-shadow:0 10px 0 rgba(0,0,0,.15);}
.modal h3{margin-bottom:10px;color:#a8502f;}
.modal p{font-size:.92rem;line-height:1.5;}

/* confetti */
.confetti{position:fixed;top:-20px;font-size:1.6rem;pointer-events:none;z-index:60;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:.2;}}

footer.credit{text-align:center;font-size:.75rem;opacity:.45;padding:14px;}
</style>
</head>

   d'origine, pour pouvoir le colorer en vert (leçon en cours) ou en bleu
   (un autre digramme) selon l'écran où le mot est affiché. */
DIGRAMMES.forEach(dig=>{
  dig.words.forEach(w=>{
    w.segs.forEach(seg=>{ if(seg[1]==='t') seg[1] = dig.id; });
  });
});

/* =========================================================

function wordText(w){ return w.segs.map(s=>s[0]).join(''); }
function containsDig(word, dig){
  const w = word.toLowerCase();
  return dig.variants.some(v=>w.includes(v));
}
/* ty vaut 's' (muette), 'n' (normale) ou l'id d'un digramme.
   currentDigId permet de savoir si ce digramme est celui de la leçon (vert)
   ou un autre digramme croisé au passage (bleu). */
function renderSegs(segs, currentDigId){
  return segs.map(([t,ty])=>{
    let cls = ty==='s' ? 'seg-s' : ty==='n' ? 'seg-n' : (ty===currentDigId ? 'seg-t' : 'seg-b');
    return `<span class="${cls}">${t}</span>`;
  }).join('');
}
/* tout mot/phrase à LIRE s'affiche en deux lignes : capitales, puis script cursif.
   (les instructions et le reste de l'interface restent en majuscules seules, via le CSS global) */
function wordBlock(html){
  return `<span class="word-block"><span class="w-upper">${html}</span><span class="w-script">${html}</span></span>`;
}
/* segmente une phrase mot par mot via le dictionnaire WORD_SEGS ;
   la ponctuation/les espaces passent tels quels. */
function renderSentence(sentence, currentDigId){
  const tokens = sentence.match(/[A-Za-zÀ-ÖØ-öø-ÿŒœ]+|[^A-Za-zÀ-ÖØ-öø-ÿŒœ]+/g) || [];
  return tokens.map(tok=>{
    if(!/[A-Za-zÀ-ÖØ-öø-ÿŒœ]/.test(tok)) return tok;
    const variants = WORD_SEGS[tok.toLowerCase()];
    if(!variants) return `<span class="seg-n">${tok}</span>`;
    const segs = variants.find(v=>v.some(s=>s[1]===currentDigId)) || variants[0];
    return renderSegs(segs, currentDigId);
  }).join('');
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0,n); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function digOf(id){ return DIGRAMMES.find(d=>d.id===id); }
function uniqueByText(entries){
  const seen = new Set();
  const out = [];
  entries.forEach(e=>{ if(!seen.has(e.text)){ seen.add(e.text); out.push(e); } });
  return out;
}

const ALL_WORDS = DIGRAMMES.flatMap(d => d.words.map(w => ({ w, dig:d, text:wordText(w) })));

/* un même mot peut exister dans plusieurs leçons (ex: "chien" en ch et en ien) :
   on garde toutes les segmentations possibles, choisies au rendu selon la leçon. */
const WORD_SEGS = {};
function addWordSegs(key, segs){
  (WORD_SEGS[key] = WORD_SEGS[key] || []).push(segs);
}
ALL_WORDS.forEach(o=> addWordSegs(o.text.toLowerCase(), o.w.segs));
Object.keys(EXTRA_WORDS).forEach(key=> addWordSegs(key, EXTRA_WORDS[key]));

/* speech synthesis */
let frVoice = null;
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  frVoice = voices.find(v=>v.lang==='fr-FR') || voices.find(v=>v.lang && v.lang.startsWith('fr')) || null;
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = pickVoice;
  pickVoice();
}
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  if(frVoice) u.voice = frVoice;
  u.rate = 0.82;
  speechSynthesis.speak(u);
}

/* progress (localStorage) */
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem('zigo_progress')) || {}; }catch(e){ return {}; }
}
function saveProgress(p){ localStorage.setItem('zigo_progress', JSON.stringify(p)); }
function markComplete(digId, gameId){
  const p = loadProgress();
  p[digId] = p[digId] || [];
  if(!p[digId].includes(gameId)) p[digId].push(gameId);
  saveProgress(p);
}
function progressFor(digId){
  const p = loadProgress();
  return (p[digId]||[]).length;
}
function totalStars(){
  const p = loadProgress();
  return Object.values(p).reduce((s,arr)=>s+arr.length,0);
}
function totalPossible(){ return DIGRAMMES.length * GAMES.length; }

/* confetti */
function confetti(n){
  n = n || 24;
  const emojis = ['🎉','⭐','🎈','✨','🌟','🎊'];
  for(let i=0;i<n;i++){
    const s = document.createElement('div');
    s.className = 'confetti';
    s.textContent = pick(emojis);
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (2+Math.random()*1.5)+'s';
    s.style.fontSize = (1+Math.random()*1.2)+'rem';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 3600);
  }
}

/* daily challenge (stable per day) */
function dailyPick(){
  const d = new Date();
  const seed = d.getFullYear()*372 + d.getMonth()*31 + d.getDate();
  const dig = DIGRAMMES[seed % DIGRAMMES.length];
  const game = GAMES[seed % GAMES.length];
  return {dig, game};
}

/* ---------- 3. Mémory ---------- */
function runMemory(container, dig){
  container.innerHTML = '';
  const n = Math.min(5, dig.words.length);
  const chosen = sample(dig.words, n);
  let cards = [];
  chosen.forEach((w,i)=>{
    cards.push({pair:i, kind:'emoji', content:w.emoji});
    cards.push({pair:i, kind:'word', content:wordBlock(renderSegs(w.segs, dig.id)), text:wordText(w)});
  });
  cards = shuffle(cards);

  const grid = document.createElement('div');
  grid.className = 'memgrid';
  container.appendChild(grid);

  let flipped = [];
  let matched = 0;
  let lock = false;

  cards.forEach((c, idx)=>{
    const el = document.createElement('div');
    el.className = 'memcard';
    el.innerHTML = `<div class="face back">🍃</div><div class="face front${c.kind==='emoji' ? ' front-emoji' : ''}">${c.content}</div>`;
    el.dataset.idx = idx;
    el.addEventListener('click', ()=>{
      if(lock || el.classList.contains('flip') || el.classList.contains('matched')) return;
      el.classList.add('flip');
      flipped.push({el, c});
      if(flipped.length===2){
        lock = true;
        const [a,b] = flipped;
        if(a.c.pair===b.c.pair && a.c.kind!==b.c.kind){
          setTimeout(()=>{
            a.el.classList.add('matched'); b.el.classList.add('matched');
            matched++; flipped=[]; lock=false;
            if(matched===n) finishScreen(container, dig, {id:'memory'}, "Toutes les paires trouvées !");
          }, 350);
        } else {
          setTimeout(()=>{
            a.el.classList.remove('flip'); b.el.classList.remove('flip');
            flipped=[]; lock=false;
          }, 800);
        }
      }
    });
    grid.appendChild(el);
  });
}

/* ---------- 4. Quiz image ---------- */
function runQuiz(container, dig, game){
  const rounds = Math.min(5, dig.words.length);
  const sequence = sample(dig.words, rounds);
  let idx = 0, score = 0;

  function step(){
    container.innerHTML = '';
    if(idx>=sequence.length){
      return finishScreen(container, dig, game, `Score : ${score}/${sequence.length}`);
    }
    const target = sequence[idx];
    const pool = uniqueByText(ALL_WORDS.filter(o=>o.text!==wordText(target)));
    const others = sample(pool, 3);
    const options = shuffle([{text:wordText(target), segs:target.segs}, ...others.map(o=>({text:o.text, segs:o.w.segs}))]);

    const img = document.createElement('div');
    img.className = 'qimg';
    img.textContent = target.emoji;
    container.appendChild(img);

    const p = document.createElement('p');
    p.className = 'center';
    p.style.fontWeight = '700';
    p.textContent = 'Quel est ce mot ?';
    container.appendChild(p);

    const grid = document.createElement('div');
    grid.className = 'optgrid';
    options.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'optbtn';
      b.innerHTML = wordBlock(renderSegs(opt.segs, dig.id));
      b.addEventListener('click', ()=>{
        speak(opt.text);
        if(opt.text === wordText(target)){
          b.classList.add('correct');
          score++;
          setTimeout(()=>{ idx++; step(); }, 550);
        } else {
          b.classList.add('wrong','shake');
          setTimeout(()=>b.classList.remove('shake'), 400);
        }
      });
      grid.appendChild(b);
    });
    container.appendChild(grid);
  }
  step();
}

/* ---------- 5. Intrus ---------- */
function runIntrus(container, dig, game){
  const rounds = 5;
  let idx = 0, score = 0;

  function step(){
    container.innerHTML = '';
    if(idx>=rounds){
      return finishScreen(container, dig, game, `Score : ${score}/${rounds}`);
    }
    const good = sample(dig.words, 3).map(w=>({t:wordText(w), segs:w.segs, ok:false}));
    const badPool = uniqueByText(ALL_WORDS.filter(o=>!containsDig(o.text, dig)));
    const badEntry = pick(badPool);
    const bad = {t:badEntry.text, segs:badEntry.w.segs, ok:true};
    const items = shuffle([...good, bad]);

    const head = document.createElement('div');
    head.className = 'sonhead';
    head.innerHTML = `<p class="center" style="font-weight:700">Le son : <span class="seg-t" style="font-size:1.3rem">${dig.label}</span></p><p class="center" style="font-weight:700">Un mot est différent. Trouve-le !</p>`;
    container.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'optgrid';
    items.forEach(it=>{
      const b = document.createElement('button');
      b.className = 'optbtn';
      b.innerHTML = wordBlock(renderSegs(it.segs, dig.id));
      b.addEventListener('click', ()=>{
        speak(it.t);
        if(it.ok){
          b.classList.add('correct');
          score++;
          setTimeout(()=>{ idx++; step(); }, 550);
        } else {
          b.classList.add('wrong','shake');
          setTimeout(()=>b.classList.remove('shake'), 400);
        }
      });
      grid.appendChild(b);
    });
    container.appendChild(grid);
  }
  step();
}

/* ---------- 6. Mot à trou ---------- */
function runTrous(container, dig, game){
  const pool = dig.words.filter(w => w.segs.filter(s=>s[1]===dig.id).length===1);
  const words = pool.length ? pool : dig.words;
  const rounds = Math.min(5, words.length);
  const sequence = sample(words, rounds);
  let idx = 0, score = 0;

  const otherTargets = DIGRAMMES.filter(d=>d.id!==dig.id).flatMap(d=>
    d.words.flatMap(w=>w.segs.filter(s=>s[1]===d.id).map(s=>s[0]))
  );

  function step(){
    container.innerHTML = '';
    if(idx>=sequence.length){
      return finishScreen(container, dig, game, `Score : ${score}/${sequence.length}`);
    }
    const w = sequence[idx];
    const correct = w.segs.find(s=>s[1]===dig.id)[0];

    const img = document.createElement('div');
    img.className = 'qimg';
    img.textContent = w.emoji;
    container.appendChild(img);

    const bw = document.createElement('div');
    bw.className = 'blankword';
    const blankHtml = w.segs.map(([t,ty])=>{
      if(ty===dig.id) return `<span class="blank">${t}</span>`;
      const cls = ty==='s' ? 'seg-s' : ty==='n' ? 'seg-n' : 'seg-b';
      return `<span class="${cls}">${t}</span>`;
    }).join('');
    bw.innerHTML = wordBlock(blankHtml);
    container.appendChild(bw);

    const distractors = sample(otherTargets.filter(t=>t!==correct), 2);
    const options = shuffle([correct, ...distractors]);

    const grid = document.createElement('div');
    grid.className = 'optgrid';
    options.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'optbtn';
      b.textContent = opt;
      b.addEventListener('click', ()=>{
        if(opt===correct){
          b.classList.add('correct');
          bw.innerHTML = wordBlock(renderSegs(w.segs, dig.id));
          speak(wordText(w));
          score++;
          setTimeout(()=>{ idx++; step(); }, 700);
        } else {
          b.classList.add('wrong','shake');
          setTimeout(()=>b.classList.remove('shake'), 400);
        }
      });
      grid.appendChild(b);
    });
    container.appendChild(grid);
  }
  step();
}

/* ---------- 7. Tri ---------- */
function runTri(container, dig, game){
  container.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'sonhead';
  head.innerHTML = `<p class="center" style="font-weight:700">On cherche le son <span class="seg-t" style="font-size:1.3rem">${dig.label}</span></p>`;
  container.appendChild(head);

  const yesWords = sample(dig.words, Math.min(4, dig.words.length));
  const noPool = uniqueByText(ALL_WORDS.filter(o=>!containsDig(o.text, dig)));
  const noWords = sample(noPool, 4);
  let items = shuffle([
    ...yesWords.map(w=>({t:wordText(w), segs:w.segs, ok:true})),
    ...noWords.map(o=>({t:o.text, segs:o.w.segs, ok:false}))
  ]);

  const pool = document.createElement('div');
  pool.className = 'pool';
  container.appendChild(pool);

  const zones = document.createElement('div');
  zones.className = 'zones';
  zones.innerHTML = `
    <div class="zone" id="zYes"><h4>✅ Avec « ${dig.label} »</h4><div class="items"></div></div>
    <div class="zone" id="zNo"><h4>🚫 Sans « ${dig.label} »</h4><div class="items"></div></div>
  `;
  container.appendChild(zones);

  let selected = null;
  let placed = 0;

  function renderPool(){
    pool.innerHTML = '';
    items.forEach(it=>{
      if(it.placed) return;
      const chip = document.createElement('button');
      chip.className = 'chip' + (selected===it ? ' sel' : '');
      chip.innerHTML = wordBlock(renderSegs(it.segs, dig.id));
      chip.addEventListener('click', ()=>{
        speak(it.t);
        selected = it;
        renderPool();
      });
      pool.appendChild(chip);
    });
  }
  renderPool();

  function place(zoneOk){
    if(!selected) return;
    const zoneEl = document.getElementById(zoneOk ? 'zYes' : 'zNo').querySelector('.items');
    if(selected.ok === zoneOk){
      selected.placed = true;
      const s = document.createElement('span');
      s.innerHTML = '✅ ' + wordBlock(renderSegs(selected.segs, dig.id));
      zoneEl.appendChild(s);
      placed++;
      selected = null;
      renderPool();
      if(placed===items.length){
        setTimeout(()=>finishScreen(container, dig, game, "Tous les mots sont bien triés !"), 400);
      }
    } else {
      const zone = document.getElementById(zoneOk?'zYes':'zNo');
      zone.classList.add('shake');
      setTimeout(()=>zone.classList.remove('shake'), 400);
    }
  }
  zones.querySelector('#zYes').addEventListener('click', ()=>place(true));
  zones.querySelector('#zNo').addEventListener('click', ()=>place(false));
}

/* =========================================================
   Ceci n'est pas une appli installable : on nettoie tout Service Worker
   / cache posé par une ancienne version, pour éviter d'afficher du
   contenu périmé (voir historique).
========================================================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  }).catch(()=>{});
}
if(window.caches && caches.keys){
  caches.keys().then(keys=>{
    keys.forEach(k=>caches.delete(k));
  }).catch(()=>{});
}

/* =========================================================
   INIT
========================================================= */
render();
</script>
</body>
</html>
